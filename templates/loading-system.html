<!--
    SISTEMA GLOBAL DE ANIMACIONES DE CARGA
    - Sin logo, puntos centrados estilo Facebook/WhatsApp
-->

<style>
/* ============================================
   PANTALLA DE INICIO - DOTS CENTRADOS
   ============================================ */
#global-loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999999;
    opacity: 1;
    transition: opacity 0.5s ease;
}

#global-loader.hidden {
    opacity: 0;
    pointer-events: none;
}

/* ============================================
   DOTS ESTILO FACEBOOK / WHATSAPP
   ============================================ */
.fb-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.fb-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #0066FF;
    animation: fbDotBounce 1.4s ease-in-out infinite both;
}

.fb-dot:nth-child(1) { animation-delay: 0s; }
.fb-dot:nth-child(2) { animation-delay: 0.2s; }
.fb-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes fbDotBounce {
    0%, 80%, 100% {
        transform: scale(0.7);
        opacity: 0.35;
    }
    40% {
        transform: scale(1.2);
        opacity: 1;
    }
}

/* ============================================
   BLOQUEADOR ANTI-SATURACIÓN - DOTS STYLE
   ============================================ */
#saturation-blocker {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999998;
    opacity: 0;
    pointer-events: none;
    transition: none;
}

#saturation-blocker.active {
    opacity: 1;
    pointer-events: all;
}

.saturation-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.saturation-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #0066FF;
    animation: fbDotBounce 1.4s ease-in-out infinite both;
}

.saturation-dot:nth-child(1) { animation-delay: 0s; }
.saturation-dot:nth-child(2) { animation-delay: 0.2s; }
.saturation-dot:nth-child(3) { animation-delay: 0.4s; }

/* ============================================
   BOTONES DESHABILITADOS DURANTE CARGA
   ============================================ */
body.loading-active button,
body.loading-active .btn,
body.loading-active [onclick],
body.loading-active a[href],
body.loading-active .nav-item,
body.loading-active .item,
body.loading-active input[type="submit"] {
    pointer-events: none !important;
    opacity: 0.5 !important;
    cursor: not-allowed !important;
    user-select: none !important;
}

body.loading-active .nav-item {
    opacity: 0.35 !important;
}
</style>

<!-- Pantalla de Inicio -->
<div id="global-loader">
    <div class="fb-dots">
        <div class="fb-dot"></div>
        <div class="fb-dot"></div>
        <div class="fb-dot"></div>
    </div>
</div>

<!-- Bloqueador Anti-Saturación -->
<div id="saturation-blocker">
    <div class="saturation-dots">
        <div class="saturation-dot"></div>
        <div class="saturation-dot"></div>
        <div class="saturation-dot"></div>
    </div>
</div>

<script>
let isFirstLoad = !sessionStorage.getItem('arcadepxc_app_loaded');

function hideGlobalLoader() {
    const loader = document.getElementById('global-loader');
    if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => { loader.style.display = 'none'; }, 500);
    }
    sessionStorage.setItem('arcadepxc_app_loaded', 'true');
}

const SATURATION_DURATION = 0;
let isSaturationActive = false;
let saturationTimeout = null;

function showSaturationBlocker(customMessage = null) {
    if (isSaturationActive) return;
    const blocker = document.getElementById('saturation-blocker');
    if (!blocker) return;
    isSaturationActive = true;
    blocker.classList.add('active');
    document.body.classList.add('loading-active');
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
    }
    // Safety: ocultar automáticamente máximo en 1.5s
    if (saturationTimeout) clearTimeout(saturationTimeout);
    saturationTimeout = setTimeout(hideSaturationBlocker, 1500);
}

function hideSaturationBlocker() {
    const blocker = document.getElementById('saturation-blocker');
    if (!blocker) return;
    blocker.classList.remove('active');
    document.body.classList.remove('loading-active');
    isSaturationActive = false;
}

function isSaturated() { return isSaturationActive; }

function initSaturationSystem() {
    document.addEventListener('click', function(e) {
        const target = e.target;
        const isInteractive =
            target.closest('button') ||
            target.closest('.btn') ||
            target.closest('[onclick]') ||
            target.closest('.nav-item') ||
            target.closest('a[href]') ||
            target.closest('.item[onclick]') ||
            target.closest('input[type="submit"]');
        const isExcluded =
            target.closest('#promo-modal') ||
            target.closest('.toast') ||
            target.closest('#support-fab') ||
            target.closest('.language-btn') ||
            target.closest('#language-modal') ||
            target.closest('.lang-toggle-wrapper') ||
            target.closest('[data-no-saturation]');
        if (isInteractive && !isExcluded && !isSaturationActive) {
            showSaturationBlocker();
        }
    }, true);
    document.addEventListener('submit', function(e) {
        if (!isSaturationActive) showSaturationBlocker();
    }, true);
}

document.addEventListener('DOMContentLoaded', function() {
    initSaturationSystem();
    if (isFirstLoad) {
        setTimeout(hideGlobalLoader, 2500);
    } else {
        const loader = document.getElementById('global-loader');
        if (loader) loader.style.display = 'none';
    }
});

window.addEventListener('load', function() {
    if (!isFirstLoad) {
        const loader = document.getElementById('global-loader');
        if (loader) loader.style.display = 'none';
    }
});

window.showSaturationBlocker = showSaturationBlocker;
window.hideSaturationBlocker = hideSaturationBlocker;
window.isSaturated = isSaturated;
window.hideGlobalLoader = hideGlobalLoader;
window.showSectionLoader = showSaturationBlocker;
window.hideSectionLoader = hideSaturationBlocker;
</script>
