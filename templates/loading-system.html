<!--
    SISTEMA GLOBAL DE ANIMACIONES DE CARGA
    - Pantalla de inicio con puntos estilo Facebook/WhatsApp
    - Sin textos, animación limpia y minimalista
-->

<style>
/* ============================================
   PANTALLA DE INICIO - DOTS STYLE
   ============================================ */
#global-loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 50%, #000000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999999;
    opacity: 1;
    transition: opacity 0.6s ease;
    overflow: hidden;
}

#global-loader.hidden {
    opacity: 0;
    pointer-events: none;
}

/* Logo Container */
.loader-logo {
    width: 130px;
    height: 130px;
    margin-bottom: 48px;
    position: relative;
}

.loader-logo::before {
    content: '';
    position: absolute;
    inset: -20px;
    background: radial-gradient(circle, rgba(0, 102, 255, 0.15), transparent 70%);
    filter: blur(25px);
    animation: glowPulse 3s ease-in-out infinite;
}

.loader-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    position: relative;
    z-index: 1;
    animation: logoFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 0 30px rgba(0, 102, 255, 0.7))
            drop-shadow(0 0 60px rgba(0, 102, 255, 0.3));
}

/* ============================================
   DOTS ESTILO FACEBOOK / WHATSAPP
   ============================================ */
.fb-dots {
    display: flex;
    align-items: center;
    gap: 10px;
}

.fb-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.85);
    animation: fbDotBounce 1.4s ease-in-out infinite both;
}

.fb-dot:nth-child(1) { animation-delay: 0s; }
.fb-dot:nth-child(2) { animation-delay: 0.2s; }
.fb-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes fbDotBounce {
    0%, 80%, 100% {
        transform: scale(0.7);
        opacity: 0.4;
    }
    40% {
        transform: scale(1.15);
        opacity: 1;
    }
}

/* ============================================
   BLOQUEADOR ANTI-SATURACIÓN - DOTS STYLE
   ============================================ */
#saturation-blocker {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(5, 5, 10, 0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999998;
    opacity: 0;
    transition: opacity 0.3s ease;
}

#saturation-blocker.active {
    display: flex;
    opacity: 1;
}

/* Dots del saturation blocker */
.saturation-dots {
    display: flex;
    align-items: center;
    gap: 12px;
}

.saturation-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.9);
    animation: fbDotBounce 1.4s ease-in-out infinite both;
}

.saturation-dot:nth-child(1) { animation-delay: 0s; }
.saturation-dot:nth-child(2) { animation-delay: 0.2s; }
.saturation-dot:nth-child(3) { animation-delay: 0.4s; }

/* ============================================
   BOTONES DESHABILITADOS DURANTE CARGA
   ============================================ */
body.loading-active button,
body.loading-active .btn,
body.loading-active [onclick],
body.loading-active a[href],
body.loading-active .nav-item,
body.loading-active .item,
body.loading-active input[type="submit"] {
    pointer-events: none !important;
    opacity: 0.5 !important;
    cursor: not-allowed !important;
    user-select: none !important;
}

body.loading-active .nav-item {
    opacity: 0.35 !important;
}

/* ============================================
   ANIMACIONES
   ============================================ */
@keyframes logoFloat {
    0%, 100% { transform: translateY(0) scale(1); }
    50%       { transform: translateY(-8px) scale(1.03); }
}

@keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.2); }
}

/* Responsive */
@media (max-width: 480px) {
    .loader-logo    { width: 110px; height: 110px; }
    .fb-dot         { width: 9px; height: 9px; }
    .saturation-dot { width: 11px; height: 11px; }
}
</style>

<!-- Pantalla de Inicio -->
<div id="global-loader">
    <div class="loader-logo">
        <img src="/static/imagen/logo.png" alt="Logo" onerror="this.style.display='none'">
    </div>
    <div class="fb-dots">
        <div class="fb-dot"></div>
        <div class="fb-dot"></div>
        <div class="fb-dot"></div>
    </div>
</div>

<!-- Bloqueador Anti-Saturación (cambio de páginas / procesando) -->
<div id="saturation-blocker">
    <div class="saturation-dots">
        <div class="saturation-dot"></div>
        <div class="saturation-dot"></div>
        <div class="saturation-dot"></div>
    </div>
</div>

<script>
// ============================================
// SISTEMA DE CARGA INICIAL
// ============================================

let isFirstLoad = !sessionStorage.getItem('sally_app_loaded');

function hideGlobalLoader() {
    const loader = document.getElementById('global-loader');
    if (loader) {
        loader.classList.add('hidden');
        setTimeout(() => { loader.style.display = 'none'; }, 600);
    }
    sessionStorage.setItem('sally_app_loaded', 'true');
}

// ============================================
// SISTEMA ANTI-SATURACIÓN
// ============================================

const SATURATION_DURATION = 0;
let isSaturationActive = false;
let saturationTimeout = null;

function showSaturationBlocker(customMessage = null) {
    if (isSaturationActive) return;

    const blocker = document.getElementById('saturation-blocker');
    if (!blocker) return;

    isSaturationActive = true;
    blocker.classList.add('active');
    document.body.classList.add('loading-active');

    if (saturationTimeout) clearTimeout(saturationTimeout);

    saturationTimeout = setTimeout(() => {
        hideSaturationBlocker();
    }, SATURATION_DURATION);

    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
    }
}

function hideSaturationBlocker() {
    const blocker = document.getElementById('saturation-blocker');
    if (!blocker) return;

    blocker.classList.remove('active');
    document.body.classList.remove('loading-active');
    isSaturationActive = false;
}

function isSaturated() {
    return isSaturationActive;
}

// ============================================
// INTERCEPTAR CLICKS EN TODA LA APP
// ============================================

function initSaturationSystem() {
    document.addEventListener('click', function(e) {
        const target = e.target;

        const isInteractive =
            target.closest('button') ||
            target.closest('.btn') ||
            target.closest('[onclick]') ||
            target.closest('.nav-item') ||
            target.closest('a[href]') ||
            target.closest('.item[onclick]') ||
            target.closest('input[type="submit"]');

        const isExcluded =
            target.closest('#promo-modal') ||
            target.closest('.toast') ||
            target.closest('#support-fab') ||
            target.closest('[data-no-saturation]');

        if (isInteractive && !isExcluded && !isSaturationActive) {
            showSaturationBlocker();
        }
    }, true);

    document.addEventListener('submit', function(e) {
        if (!isSaturationActive) {
            showSaturationBlocker();
        }
    }, true);
}

// ============================================
// INICIALIZACIÓN
// ============================================

document.addEventListener('DOMContentLoaded', function() {
    initSaturationSystem();

    if (isFirstLoad) {
        setTimeout(hideGlobalLoader, 2500);
    } else {
        const loader = document.getElementById('global-loader');
        if (loader) loader.style.display = 'none';
    }
});

window.addEventListener('load', function() {
    if (!isFirstLoad) {
        const loader = document.getElementById('global-loader');
        if (loader) loader.style.display = 'none';
    }
});

// Exportar funciones globalmente
window.showSaturationBlocker = showSaturationBlocker;
window.hideSaturationBlocker = hideSaturationBlocker;
window.isSaturated = isSaturated;
window.hideGlobalLoader = hideGlobalLoader;

// Funciones legacy para compatibilidad
window.showSectionLoader = showSaturationBlocker;
window.hideSectionLoader = hideSaturationBlocker;
</script>
